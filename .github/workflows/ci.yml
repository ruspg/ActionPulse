name: CI

on:
  push:
    branches: [main]
    paths:
      - 'digest-core/**'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'digest-core/**'
      - '.github/workflows/ci.yml'

defaults:
  run:
    working-directory: digest-core

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: 'digest-core/pyproject.toml'

      - name: Install dependencies
        run: uv sync

      - name: Ruff lint
        run: uv run ruff check src/ tests/

      - name: Black format check
        run: uv run black --check src/ tests/

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: 'digest-core/pyproject.toml'

      - name: Install dependencies
        run: uv sync

      - name: Run tests
        run: uv run pytest tests/ -v
        env:
          PYTHONPATH: src

  docker:
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t digest-core:ci -f docker/Dockerfile .
        working-directory: digest-core
